rs, 5 Months & 2 Days in the Life Of..."}, {"a": "The Fratellis", "t": "Costello Music"}, {"a": "The Pogues", "t": "Rum Sodomy & the Lash"}, {"a": "Madrugada", "t": "The Deep End"}, {"a": "The Killers", "t": "Pressure Machine"}, {"a": "Tears For Fears", "t": "The Seeds Of Love"}, {"a": "Cage the Elephant", "t": "Cage the Elephant"}, {"a": "Jack White", "t": "Fear Of The Dawn"}, {"a": "Prince", "t": "1999"}, {"a": "Sea Girls", "t": "Homesick"}, {"a": "Eagles of Death Metal", "t": "Heart On"}, {"a": "Massive Attack", "t": "Protection"}, {"a": "Talking heads", "t": "Little Creatures"}, {"a": "The Libertines", "t": "Libertines"}, {"a": "KLF", "t": "The white room"}, {"a": "PJ Harvey", "t": "To Bring you my Love"}, {"a": "Pulp", "t": "This Is Hardcore"}, {"a": "Kings of Leon", "t": "Can We Please Have Fun"}, {"a": "The Police", "t": "Ghost in the Machine"}, {"a": "Hozier", "t": "Wasteland, Baby!"}, {"a": "Nirvana", "t": "From The Muddy Banks of Whiskah"}, {"a": "Jimmy Eat World", "t": "Futures"}, {"a": "Sheryl Crow", "t": "The Globe Sessions"}, {"a": "The Naked and Famous", "t": "Passive Me, Aggressive You"}, {"a": "Elephant", "t": "Shooting for the Moon"}, {"a": "Alice Cooper", "t": "School's Out"}, {"a": "Banji", "t": "Freshcakes"}, {"a": "Jack Johnson", "t": "In Between Dreams"}, {"a": "The Strokes", "t": "First Impressions of Earth"}, {"a": "Patrick Watson", "t": "Close to Paradise"}, {"a": "Daft Punk", "t": "Homework"}, {"a": "Ghost", "t": "Prequelle"}, {"a": "The Kinks", "t": "The Kinks"}, {"a": "Sublime", "t": "Sublime"}, {"a": "The Deaf", "t": "Toot Whistle Plunk Boom!"}, {"a": "The Clash", "t": "Combat Rock"}, {"a": "The Shins", "t": "Wincing The Night Away"}, {"a": "Killing joke", "t": "Night Time"}, {"a": "The Fray", "t": "How To Save A Life"}, {"a": "Red Hot Chili Peppers", "t": "One Hot Minute"}, {"a": "Radiohead", "t": "A moon shaped pool"}, {"a": "Talking heads", "t": "Speaking in Tongues"}, {"a": "Bowling for Soup", "t": "Drunk Enough to Dance"}, {"a": "The 1975", "t": "A Brief Inquiry into Online Relationships"}, {"a": "Bruce Springsteen", "t": "Tunnel Of Love"}, {"a": "Faithless", "t": "Outrospective"}, {"a": "The Church", "t": "Starfish"}, {"a": "The Gaslight Anthem", "t": "Handwritten"}, {"a": "The Avalanches", "t": "Since I Left You"}, {"a": "Supergrass", "t": "Supergrass"}];

  const box = document.getElementById("box");
  const rangEl = document.getElementById("rang");
  const titelEl = document.getElementById("titel");
  const artiestEl = document.getElementById("artiest");
  const knop = document.getElementById("knop");
  const spotifyBtn = document.getElementById("spotify");
  const appleBtn = document.getElementById("apple");
  const mijnKnop = document.getElementById("mijnKnop");
  const mijnLabel = document.getElementById("mijnLabel");
  const mijnPick = document.getElementById("mijnPick");
  const statusEl = document.getElementById("status");
  const setupEl = document.getElementById("setup");

  let huidig = null;

  // ---- eerlijke willekeur ----
  function trekIndex(n) {
    const max = Math.floor(0xFFFFFFFF / n) * n;
    const buf = new Uint32Array(1);
    let v;
    do { crypto.getRandomValues(buf); v = buf[0]; } while (v >= max);
    return v % n;
  }

  // ---- KINK-trekking ----
  function toon() {
    const i = trekIndex(ALBUMS.length);
    huidig = ALBUMS[i];
    box.classList.remove("leeg");
    rangEl.textContent = "#" + (i + 1);
    titelEl.textContent = huidig.t;
    artiestEl.textContent = huidig.a;
    titelEl.classList.remove("pop"); void titelEl.offsetWidth; titelEl.classList.add("pop");
    spotifyBtn.disabled = false; appleBtn.disabled = false;
  }
  function zoekterm() { return (huidig.a + " " + huidig.t).trim(); }
  // Zoek het album op via de Spotify-API om de afspeel-URI te vinden.
  async function zoekAlbumUri(token, artiest, titel) {
    const queries = ['album:"' + titel + '" artist:"' + artiest + '"', artiest + " " + titel];
    for (const q of queries) {
      const url = "https://api.spotify.com/v1/search?type=album&limit=1&q=" + encodeURIComponent(q);
      const r = await fetch(url, { headers: { Authorization: "Bearer " + token } });
      if (r.status === 401) throw new Error("token-verlopen");
      if (!r.ok) continue;
      const data = await r.json();
      const it = data.albums && data.albums.items && data.albums.items[0];
      if (it) return it;
    }
    return null;
  }
  // Spotify-knop: indien verbonden -> album opzoeken en automatisch afspelen.
  // Niet verbonden, niet gevonden, geen Premium of geen apparaat -> album/zoekopdracht openen.
  spotifyBtn.addEventListener("click", async () => {
    if (!huidig) return;
    const token = CLIENT_ID ? await getValidToken() : null;
    if (!token) {
      if (CLIENT_ID) status("Verbind eerst met Spotify (groene knop) om automatisch af te spelen.");
      window.open("https://open.spotify.com/search/" + encodeURIComponent(zoekterm()), "_blank", "noopener");
      return;
    }
    status("Album zoeken op Spotify…");
    let found;
    try { found = await zoekAlbumUri(token, huidig.a, huidig.t); }
    catch (e) { if (e.message === "token-verlopen") { login(); return; } found = null; }
    if (!found) {
      status("Niet gevonden op Spotify — ik open een zoekopdracht.");
      window.open("https://open.spotify.com/search/" + encodeURIComponent(zoekterm()), "_blank", "noopener");
      return;
    }
    const res = await playAlbum(token, { uri: found.uri });
    if (res.status === 204) status("\u25B6 Speelt nu: " + found.name + " — op " + (res.device || "apparaat"));
    else if (res.status === "geen-apparaat") { status("Open de Spotify-app op dit toestel (op iPhone mag een webpagina niet zelf afspelen). Ik open nu het album — tik daar op play."); openInSpotify(found); }
    else if (res.status === "verkeerd-toestel") { status("Op dit toestel draait geen Spotify-app. Ik open het album hier — tik op play. (Ik stuur het bewust niet naar een ander toestel.)"); openInSpotify(found); }
    else if (res.status === 403) { status("Afspelen vereist Premium — ik open het album."); openInSpotify(found); }
    else { status("Kon niet afspelen — ik open het album."); openInSpotify(found); }
  });
  // Apple Music kan vanuit een webpagina niet automatisch afspelen (vereist betaald
  // MusicKit). We openen daarom het album in de Apple Music-app; daar tik je op play.
  appleBtn.addEventListener("click", () => { if (huidig)
    window.open("https://music.apple.com/search?term=" + encodeURIComponent(zoekterm()), "_blank", "noopener"); });
  knop.addEventListener("click", toon);
  document.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); toon(); } });

  // ================= Spotify (PKCE) =================
  function status(msg) { statusEl.textContent = msg; }

  function randomString(len) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
    const arr = new Uint8Array(len); crypto.getRandomValues(arr);
    return Array.from(arr, b => chars[b % chars.length]).join("");
  }
  async function sha256(plain) {
    return await crypto.subtle.digest("SHA-256", new TextEncoder().encode(plain));
  }
  function base64url(buf) {
    return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function saveToken(tok) {
    if (tok.access_token) {
      localStorage.setItem("sp_access", tok.access_token);
      localStorage.setItem("sp_expiry", String(Date.now() + (tok.expires_in || 3600) * 1000));
    }
    if (tok.refresh_token) localStorage.setItem("sp_refresh", tok.refresh_token);
  }

  async function getValidToken() {
    const at = localStorage.getItem("sp_access");
    const exp = Number(localStorage.getItem("sp_expiry") || 0);
    if (at && Date.now() < exp - 60000) return at;
    const rt = localStorage.getItem("sp_refresh");
    if (!rt) return null;
    try {
      const body = new URLSearchParams({ client_id: CLIENT_ID, grant_type: "refresh_token", refresh_token: rt });
      const r = await fetch("https://accounts.spotify.com/api/token",
        { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body });
      if (!r.ok) return null;
      saveToken(await r.json());
      return localStorage.getItem("sp_access");
    } catch (e) { return null; }
  }

  async function login() {
    if (!CLIENT_ID) { toonSetup(); return; }
    const verifier = randomString(64);
    const challenge = base64url(await sha256(verifier));
    const state = randomString(16);
    localStorage.setItem("pkce_verifier", verifier);
    localStorage.setItem("pkce_state", state);
    const params = new URLSearchParams({
      client_id: CLIENT_ID, response_type: "code", redirect_uri: REDIRECT_URI,
      scope: SCOPES, code_challenge_method: "S256", code_challenge: challenge, state
    });
    window.location = "https://accounts.spotify.com/authorize?" + params.toString();
  }

  async function handleRedirect() {
    const p = new URLSearchParams(window.location.search);
    const code = p.get("code");
    if (!code) return;
    if (p.get("state") !== localStorage.getItem("pkce_state")) {
      status("Beveiligingscontrole mislukt (state). Probeer opnieuw te verbinden."); return;
    }
    const verifier = localStorage.getItem("pkce_verifier");
    try {
      const body = new URLSearchParams({
        client_id: CLIENT_ID, grant_type: "authorization_code",
        code, redirect_uri: REDIRECT_URI, code_verifier: verifier
      });
      const r = await fetch("https://accounts.spotify.com/api/token",
        { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body });
      const tok = await r.json();
      if (tok.error) { status("Inloggen mislukt: " + (tok.error_description || tok.error)); }
      else { saveToken(tok); status("Verbonden met Spotify."); }
    } catch (e) { status("Inloggen mislukt: " + e.message); }
    history.replaceState({}, "", REDIRECT_URI);  // ?code uit de URL halen
    updateAuthUI();
  }

  function updateAuthUI() {
    const ingelogd = !!localStorage.getItem("sp_access") || !!localStorage.getItem("sp_refresh");
    mijnLabel.textContent = ingelogd ? "Speel willekeurig album" : "Verbind met Spotify";
  }

  async function fetchAllAlbums(token) {
    let url = "https://api.spotify.com/v1/me/albums?limit=50";
    const out = [];
    while (url) {
      const r = await fetch(url, { headers: { Authorization: "Bearer " + token } });
      if (r.status === 401) throw new Error("token-verlopen");
      if (!r.ok) throw new Error("API " + r.status);
      const data = await r.json();
      for (const it of data.items) out.push(it.album);
      url = data.next;
    }
    return out;
  }

  async function getDevices(token) {
    try {
      const r = await fetch("https://api.spotify.com/v1/me/player/devices",
        { headers: { Authorization: "Bearer " + token } });
      if (!r.ok) return [];
      const data = await r.json();
      return data.devices || [];
    } catch (e) { return []; }
  }

  async function activateDevice(token, id) {
    // Maak het apparaat expliciet actief, zodat afspelen daadwerkelijk hoorbaar start.
    try {
      await fetch("https://api.spotify.com/v1/me/player", {
        method: "PUT",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ device_ids: [id], play: false })
      });
    } catch (e) {}
  }

  function opMobiel() {
    return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  }
  function kiesApparaat(devices) {
    // Kies het apparaat dat past bij het toestel waarop je nu de knop indrukt:
    // op telefoon -> Spotify-app op je telefoon; op computer -> de desktop-app.
    // Geen passend toestel beschikbaar? Geef null terug (dan NIET naar een ander toestel sturen).
    const gewenstType = opMobiel() ? "Smartphone" : "Computer";
    const passend = devices.filter(d => d.type === gewenstType);
    return passend.find(d => d.is_active) || passend[0] || null;
  }

  async function playAlbum(token, album) {
    // Zoek een beschikbaar apparaat. Geen apparaat = niets om naar te sturen.
    const devices = await getDevices(token);
    if (!devices.length) return { status: "geen-apparaat" };
    const dev = kiesApparaat(devices);
    if (!dev) {
      // Wel apparaten, maar niet op het toestel waarop je werkt -> niet naar elders sturen.
      return { status: "verkeerd-toestel" };
    }
    // Niet-actief apparaat eerst wekken, dan even wachten.
    if (!dev.is_active) { await activateDevice(token, dev.id); await new Promise(r => setTimeout(r, 500)); }
    try {
      const r = await fetch(
        "https://api.spotify.com/v1/me/player/play?device_id=" + encodeURIComponent(dev.id), {
        method: "PUT",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ context_uri: album.uri })
      });
      return { status: r.status, device: dev.name }; // 204 = ok; 403 = geen Premium/restrictie
    } catch (e) { return { status: -1 }; }
  }

  function toonAlbumKeuze(album) {
    const artiest = (album.artists && album.artists[0] && album.artists[0].name) || "";
    mijnPick.innerHTML = '<span class="ttl"></span><span class="art"></span>';
    mijnPick.querySelector(".ttl").textContent = album.name;
    mijnPick.querySelector(".art").textContent = artiest ? "  —  " + artiest : "";
  }

  function openInSpotify(album) {
    const web = (album.external_urls && album.external_urls.spotify)
      || ("https://open.spotify.com/album/" + album.id);
    window.open(web, "_blank", "noopener");
  }

  async function speelWillekeurig() {
    if (!CLIENT_ID) { toonSetup(); return; }
    const token = await getValidToken();
    if (!token) { login(); return; }
    status("Bibliotheek ophalen…");
    let albums;
    try { albums = await fetchAllAlbums(token); }
    catch (e) {
      if (e.message === "token-verlopen") { login(); return; }
      status("Kon bibliotheek niet ophalen: " + e.message); return;
    }
    if (!albums.length) { status("Geen opgeslagen albums in je bibliotheek gevonden."); return; }
    const album = albums[trekIndex(albums.length)];
    toonAlbumKeuze(album);
    const res = await playAlbum(token, album);
    if (res.status === 204) { status("\u25B6 Speelt nu af op " + (res.device || "je Spotify-apparaat") + "."); }
    else if (res.status === "geen-apparaat") { status("Open de Spotify-app op dit toestel (op iPhone mag een webpagina niet zelf afspelen). Ik open nu het album — tik daar op play."); openInSpotify(album); }
    else if (res.status === "verkeerd-toestel") { status("Op dit toestel draait geen Spotify-app. Ik open het album hier — tik op play. (Ik stuur het bewust niet naar een ander toestel.)"); openInSpotify(album); }
    else if (res.status === 403) { status("Afspelen via API vereist Premium — ik open het album in Spotify."); openInSpotify(album); }
    else { status("Kon niet automatisch afspelen — ik open het album in Spotify."); openInSpotify(album); }
  }

  function toonSetup() {
    setupEl.style.display = "block";
    setupEl.innerHTML =
      "<b>Eenmalige instelling nodig.</b>" +
      "<ol>" +
      "<li>Ga naar <code>developer.spotify.com/dashboard</code> en maak een app aan.</li>" +
      "<li>Zet bij <i>Redirect URI</i> exact dit adres: <code>" + REDIRECT_URI + "</code></li>" +
      "<li>Voeg jezelf toe onder <i>User Management</i> (app staat in Development Mode).</li>" +
      "<li>Kopieer de <i>Client ID</i> en plak die boven in het bestand bij <code>const CLIENT_ID</code>.</li>" +
      "<li>Zet het bestand online via HTTPS (Netlify/GitHub Pages) en open díé URL.</li>" +
      "</ol>" +
      "Afspelen vereist Spotify Premium + een actief apparaat; anders open ik het album.";
  }

  mijnKnop.addEventListener("click", () => {
    const ingelogd = !!localStorage.getItem("sp_access") || !!localStorage.getItem("sp_refresh");
    if (!CLIENT_ID) { toonSetup(); return; }
    if (ingelogd) speelWillekeurig(); else login();
  });

  // bij laden: eventuele redirect afhandelen + UI bijwerken
  handleRedirect();
  updateAuthUI();
  if (!CLIENT_ID) { /* hint pas tonen bij klik, niet opdringen */ }
</script>
